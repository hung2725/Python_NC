<!-- contact.html -->
{% extends "base.html" %}
{% block title %}Contact - MyBlog{% endblock %}
{% block content %}
<div class="text-center mb-5">
  <h1 class="fw-bold">Liên Hệ</h1>
  <p class="text-muted">Vui lòng liên hệ qua biểu mẫu bên dưới</p>
</div>

<form class="col-md-6 mx-auto">
  <div class="mb-3">
    <label for="name" class="form-label">Your Name</label>
    <input type="text" class="form-control" id="name" placeholder="Enter your name">
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email address</label>
    <input type="email" class="form-control" id="email" placeholder="name@example.com">
  </div>
  <div class="mb-3">
    <label for="message" class="form-label">Message</label>
    <textarea class="form-control" id="message" rows="4" placeholder="Write your message here..."></textarea>
  </div>
  <button type="submit" class="btn btn-primary px-4">Send Message</button>
</form>
{% endblock %}
